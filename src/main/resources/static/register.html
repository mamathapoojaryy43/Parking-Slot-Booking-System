<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AeroPark</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Custom stylesheet -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; py-5;">

  <div class="container animated-fade-in my-5" style="max-width: 500px;">
    <div class="text-center mb-4">
      <a class="d-flex justify-content-center align-items-center text-decoration-none text-primary" href="/index.html">
        <i class="fa-solid fa-square-parking fs-2 me-2" style="color: var(--accent-color) !important;"></i>
        <h2 class="fw-bold m-0 text-primary" style="color: var(--text-primary) !important;">AeroPark</h2>
      </a>
      <p class="text-secondary mt-2">Create an account to register vehicles and book parking slots</p>
    </div>

    <div class="glass-card shadow-lg">
      <div id="error-alert" class="alert alert-danger" style="display: none; border-radius: 12px;"></div>
      <div id="success-alert" class="alert alert-success" style="display: none; border-radius: 12px;">
        Account registered successfully! Redirecting to login...
      </div>

      <form id="register-form">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <input type="text" class="form-glass" id="username" required placeholder="Choose a username">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email Address</label>
          <input type="email" class="form-glass" id="email" required placeholder="name@example.com">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input type="password" class="form-glass" id="password" required placeholder="Enter password (min 6 characters)">
        </div>
        <div class="mb-3">
          <label for="fullName" class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-glass" id="fullName" required placeholder="Enter your full name">
        </div>
        <div class="mb-4">
          <label for="phone" class="form-label fw-semibold">Phone Number</label>
          <input type="tel" class="form-glass" id="phone" required placeholder="e.g. 9876543210">
        </div>
        <button type="submit" class="btn-glass w-100 py-3 fs-5">Create Account</button>
      </form>
    </div>

    <div class="text-center mt-3">
      <p class="text-secondary small">Already have an account? <a href="/login.html" class="fw-semibold text-decoration-none" style="color: var(--accent-color);">Log In</a></p>
    </div>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value;
        const phone = document.getElementById('phone').value;
        
        const errorAlert = document.getElementById('error-alert');
        const successAlert = document.getElementById('success-alert');
        
        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';

        if (password.length < 6) {
            errorAlert.textContent = "Password must be at least 6 characters long.";
            errorAlert.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, fullName, phone })
            });

            const data = await res.json();
            if (res.ok) {
                successAlert.style.display = 'block';
                document.getElementById('register-form').reset();
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            } else {
                errorAlert.textContent = data.error || "Registration failed. Try again.";
                errorAlert.style.display = 'block';
            }
        } catch (err) {
            errorAlert.textContent = "Connection error. Please try again later.";
            errorAlert.style.display = 'block';
        }
    });
  </script>
</body>
</html>
