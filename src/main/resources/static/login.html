<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AeroPark</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Custom stylesheet -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

  <div class="container animated-fade-in" style="max-width: 450px;">
    <div class="text-center mb-4">
      <a class="d-flex justify-content-center align-items-center text-decoration-none text-primary" href="/index.html">
        <i class="fa-solid fa-square-parking fs-2 me-2" style="color: var(--accent-color) !important;"></i>
        <h2 class="fw-bold m-0 text-primary" style="color: var(--text-primary) !important;">AeroPark</h2>
      </a>
      <p class="text-secondary mt-2">Log in to manage slots & reservations</p>
    </div>

    <div class="glass-card shadow-lg">
      <!-- Error Alerts -->
      <div id="error-alert" class="alert alert-danger" style="display: none; border-radius: 12px;">
        Invalid username or password. Please try again.
      </div>
      
      <form action="/api/auth/login" method="POST">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <input type="text" class="form-glass" id="username" name="username" required placeholder="Enter username">
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input type="password" class="form-glass" id="password" name="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn-glass w-100 py-3 fs-5">Log In</button>
      </form>
    </div>

    <div class="text-center mt-3">
      <p class="text-secondary small">Don't have an account? <a href="/register.html" class="fw-semibold text-decoration-none" style="color: var(--accent-color);">Sign Up</a></p>
    </div>
  </div>

  <script>
    // Show error message if URL has error query parameter
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        document.getElementById('error-alert').style.display = 'block';
    }
  </script>
</body>
</html>
