# Server Port (Support $PORT for cloud environments like Heroku/Render)
server.port=${PORT:8080}

# Database Configuration (Defaults to H2, overridable via environment variables for MySQL)
spring.datasource.url=${DB_URL:jdbc:h2:mem:parkingsystem}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=true

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring MVC & Resources
spring.web.resources.static-locations=classpath:/static/

# File upload settings (for potential reports)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable console logging details
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.smartparking=DEBUG
